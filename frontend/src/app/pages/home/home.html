<nav class="menu-principal">

  <!-- IZQUIERDA: sesión -->
  <div class="user-info">
    <i class="bi bi-person-circle user-icon"></i>
    <div class="user-text">
      <div class="sesion">Sesión iniciada</div>
      <div class="nombre">
        {{ empleado?.nombre }} {{ empleado?.apellido }}
      </div>
      <div class="rol">
        Rol: {{ rol }}
      </div>
    </div>
  </div>

  <!-- DERECHA: logout -->
  <button class="btn-volver" (click)="logOut()">
    <i class="bi bi-arrow-left logout"></i> Cerrar Sesión
  </button>

</nav>

<div class="grid-opciones">

  @for(item of menu; track item.id){
    <a 
    [routerLink]="item.route"
    class="tab {{ item.class }}"
    [class.disabled]="!puedeAcceder(item)"
  >
    <i [class]="item.icon"></i>
    <span>{{ item.label }}</span>
  </a>
  }
  
</div>

<router-outlet></router-outlet>
