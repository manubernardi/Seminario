<nav class="menu-principal">

  <!-- IZQUIERDA: sesión -->
  <div class="user-info">
    <i class="bi bi-person-circle user-icon"></i>
    <div class="user-text">
      <div class="sesion">Sesión iniciada</div>
      <div class="nombre">
        {{ empleado?.nombre }} {{ empleado?.apellido }}
      </div>
      <div class="rol">
        Rol: {{ rol }}
      </div>
    </div>
  </div>

  <!-- DERECHA: logout -->
  <button class="btn-volver" (click)="logOut()">
    <i class="bi bi-arrow-left logout"></i> Cerrar Sesión
  </button>

</nav>

<div class="grid-opciones">
  @for(item of menuFiltrado; track item.id; let i = $index){
    <a 
      [routerLink]="item.route"
      class="tab {{ item.class }}"
      [style.grid-area]="getGridArea(i, menuFiltrado.length)"
    >
      <i [class]="item.icon"></i>
      <span>{{ item.label }}</span>
    </a>
  }
</div>

<router-outlet></router-outlet>
